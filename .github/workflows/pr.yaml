name: 🔍 PR

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: 🔍 Checks
    uses: ./.github/workflows/checks.yaml

  pr-comment:
    name: 💬 Coverage Comment
    if: github.event_name == 'pull_request'
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 📥 Download coverage JSON
        uses: actions/download-artifact@v8
        with:
          name: coverage-json
      - name: 💬 Post or update comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const t = JSON.parse(fs.readFileSync('coverage.json', 'utf8')).data[0].totals;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const fmt = (m) => `| ${m.covered} | ${m.count} | ${m.percent.toFixed(1)}% |`;
            const body = [
              '## 📊 Code Coverage',
              '',
              '| Metric | Covered | Total | % |',
              '|--------|---------|-------|---|',
              `| **Lines** ${fmt(t.lines)}`,
              `| Functions ${fmt(t.functions)}`,
              `| Regions ${fmt(t.regions)}`,
              '',
              `📎 [HTML report](${runUrl}#artifacts) — scroll to the *Artifacts* section at the bottom of the page`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## 📊 Code Coverage'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
