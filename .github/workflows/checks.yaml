name: 🔍 Checks

on:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: 🔍 Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - name: 📦 Cache
        uses: Swatinem/rust-cache@v2
        with:
          # Additive: also cache the instrumented build dir used by cargo-llvm-cov
          cache-directories: target/llvm-cov-target
      - name: 🛡️ Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
      - name: 🔧 Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: 🎨 Format
        run: cargo fmt --all -- --check
      - name: 📎 Clippy
        run: cargo clippy --all-features -- -D warnings
      - name: 🛡️ Security audit
        run: cargo audit

      - name: 🧪 Doc tests
        run: cargo test --doc --all-features

      - name: 🧪 Test (default)
        run: cargo llvm-cov --no-report
      - name: 🧪 Test (cloud)
        run: cargo llvm-cov --no-report --features cloud
      - name: 🧪 Test (render)
        run: cargo llvm-cov --no-report --features render
      - name: 🧪 Test (all features)
        run: cargo llvm-cov --no-report --all-features

      - name: 📊 Generate coverage report
        run: |
          cargo llvm-cov report --summary-only --output-path coverage.json --json
          cargo llvm-cov report --html --output-dir coverage-html
      - name: 📎 Upload coverage HTML
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-html/
      - name: 📎 Upload coverage JSON
        uses: actions/upload-artifact@v7
        with:
          name: coverage-json
          path: coverage.json
      - name: 📝 Coverage summary
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          jq -r '
            .data[0].totals |
            "## 📊 Code Coverage\n",
            "| Metric | Covered | Total | % |",
            "|--------|---------|-------|---|",
            "| Lines | \(.lines.covered) | \(.lines.count) | \(.lines.percent | . * 10 | round / 10)% |",
            "| Functions | \(.functions.covered) | \(.functions.count) | \(.functions.percent | . * 10 | round / 10)% |",
            "| Regions | \(.regions.covered) | \(.regions.count) | \(.regions.percent | . * 10 | round / 10)% |"
          ' coverage.json >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📎 [HTML report](${RUN_URL}#artifacts) — scroll to the *Artifacts* section at the bottom of the page" >> $GITHUB_STEP_SUMMARY
      - name: 📖 Doc
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"
