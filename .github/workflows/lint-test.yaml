name: 🔍 Lint & Test

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: 🔍 Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - name: 📦 Cache
        uses: Swatinem/rust-cache@v2
        with:
          # Additive: also cache the instrumented build dir used by cargo-llvm-cov
          cache-directories: target/llvm-cov-target
      - name: 🛡️ Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
      - name: 🔧 Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: 🎨 Format
        run: cargo fmt --all -- --check
      - name: 📎 Clippy
        run: cargo clippy --all-features -- -D warnings
      - name: 🛡️ Security audit
        run: cargo audit

      - name: 🧪 Test (default)
        run: cargo llvm-cov --no-report
      - name: 🧪 Test (cloud)
        run: cargo llvm-cov --no-report --features cloud
      - name: 🧪 Test (render)
        run: cargo llvm-cov --no-report --features render
      - name: 🧪 Test (all features)
        run: cargo llvm-cov --no-report --all-features
      - name: 🧪 Doc tests
        run: cargo test --doc --all-features

      - name: 📊 Generate coverage report
        run: cargo llvm-cov report --summary-only --output-path coverage.json --json
      - name: 📝 Coverage summary
        run: |
          TOTAL=$(jq -r '.data[0].totals.lines.percent' coverage.json)
          COVERED=$(jq -r '.data[0].totals.lines.covered' coverage.json)
          COUNT=$(jq -r '.data[0].totals.lines.count' coverage.json)
          echo "## 📊 Code Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Lines covered** | ${COVERED} / ${COUNT} |" >> $GITHUB_STEP_SUMMARY
          printf "| **Coverage** | %.1f%% |\n" "$TOTAL" >> $GITHUB_STEP_SUMMARY
      - name: 💬 PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('coverage.json', 'utf8'));
            const totals = data.data[0].totals.lines;
            const pct = totals.percent.toFixed(1);
            const body = `## 📊 Coverage: ${pct}% (${totals.covered}/${totals.count} lines)`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## 📊 Coverage:'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: 📖 Doc
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"
